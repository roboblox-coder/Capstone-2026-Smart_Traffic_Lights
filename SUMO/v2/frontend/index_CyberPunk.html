<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUMO Live Traffic — Cyberpunk City Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #3a1c71;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Cyberpunk Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a14; }
        ::-webkit-scrollbar-thumb { background: #00f3ff; border-radius: 4px; }

        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            background: rgba(10, 10, 18, 0.92);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
            z-index: 20;
            backdrop-filter: blur(8px);
        }

        #top-bar h1 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #e6edf3;
            letter-spacing: 1px;
        }

        #top-bar h1 span {
            color: #00f3ff;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.8);
        }

        #status-badge {
            font-size: .78rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255, 0, 85, 0.15);
            color: #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.5);
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.3);
            transition: all .3s;
            text-shadow: 0 0 4px rgba(255, 0, 85, 0.5);
        }

        #status-badge.connected {
            background: rgba(0, 243, 255, 0.15);
            color: #00f3ff;
            border: 1px solid rgba(0, 243, 255, 0.5);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.3);
            text-shadow: 0 0 4px rgba(0, 243, 255, 0.5);
        }

        #main-wrap {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #canvas-container {
            flex: 1;
            position: relative;
        }

        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 5;
            font-size: .8rem;
            color: rgba(0, 243, 255, 0.7);
            line-height: 1.7;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0, 243, 255, 0.4);
            font-family: 'Courier New', monospace;
        }

        #hud b {
            color: #00f3ff;
            text-shadow: 0 0 8px #00f3ff;
        }

        aside {
            width: 280px;
            background: rgba(10, 10, 18, 0.94);
            border-left: 1px solid rgba(255, 0, 170, 0.3);
            box-shadow: -5px 0 20px rgba(255, 0, 170, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 15;
            backdrop-filter: blur(8px);
        }

        aside h2 {
            font-size: .8rem;
            padding: 12px 14px;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: #ff00aa;
            text-shadow: 0 0 5px rgba(255, 0, 170, 0.5);
            border-bottom: 1px solid rgba(255, 0, 170, 0.2);
            font-family: 'Courier New', monospace;
        }

        #tl-panel {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }

        .tl-card {
            background: rgba(10, 10, 20, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all .2s;
        }

        .tl-card:hover {
            border-color: #00f3ff;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .tl-id {
            font-size: .85rem;
            font-weight: bold;
            color: #00f3ff;
            text-shadow: 0 0 4px rgba(0, 243, 255, 0.5);
        }

        .tl-state {
            font-family: 'Courier New', monospace;
            font-size: .72rem;
            color: #ff00aa;
            word-break: break-all;
            max-width: 110px;
            text-shadow: 0 0 3px rgba(255, 0, 170, 0.5);
        }

        .tl-btns {
            display: flex;
            gap: 4px;
        }

        .tl-btns button {
            background: rgba(255, 0, 170, 0.1);
            border: 1px solid rgba(255, 0, 170, 0.4);
            color: #ff00aa;
            border-radius: 4px;
            padding: 3px 8px;
            font-size: .7rem;
            font-weight: bold;
            cursor: pointer;
            transition: all .2s;
        }

        .tl-btns button:hover {
            background: #ff00aa;
            color: #050510;
            box-shadow: 0 0 8px #ff00aa;
        }

        #log-wrap {
            height: 140px;
            border-top: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        #log-wrap h2 {
            flex-shrink: 0;
            color: #00f3ff;
            border-bottom: none;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        #log {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px;
            font-family: 'Courier New', monospace;
            font-size: .68rem;
            color: #8b949e;
            line-height: 1.5;
        }

        #log .err { color: #ff0055; text-shadow: 0 0 4px rgba(255, 0, 85, 0.5); }

        #controls {
            position: absolute;
            top: 60px;
            left: 20px;
            z-index: 5;
            background: rgba(10, 10, 18, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(8px);
            display: none;
            color: #ecf0f1;
            font-family: 'Courier New', monospace;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div id="top-bar">
        <h1>NEON <span>SUMO</span> Live City Viewer</h1>
        <div style="display:flex;gap:8px;align-items:center;">
            <label style="font-size:.72rem;color:rgba(0,243,255,.6);letter-spacing:1px;">AI.MODEL</label>
            <select id="model-select" title="Switch the active AI controller live"
                style="font-size:.74rem;padding:4px 8px;border-radius:6px;background:#0a0a18;color:#00f3ff;border:1px solid rgba(0,243,255,.4);cursor:pointer;">
                <option value="">(loading…)</option>
            </select>
            <span id="ai-badge" title="AI controller status"
                style="font-size:.76rem;padding:4px 12px;border-radius:20px;background:rgba(0,243,255,.10);color:rgba(0,243,255,.5);border:1px solid rgba(0,243,255,.25);">
                AI: idle
            </span>
            <span id="status-badge">● Offline</span>
        </div>
    </div>

    <div id="main-wrap">
        <!-- WebGL Canvas Container -->
        <div id="canvas-container">
            <!-- HUD Overlay -->
            <div id="hud">
                SYS.STEP: <b id="hud-step">—</b><br>
                ENTITIES: <b id="hud-veh">0</b><br>
                NODES.TL: <b id="hud-tl">0</b>
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside>
            <h2>AI Decisions <span id="ai-dec-model" style="font-size:.7rem;color:#ff00aa;font-weight:400;"></span></h2>
            <div id="ai-decisions"
                style="font-family:ui-monospace,Menlo,monospace;font-size:.72rem;line-height:1.5;max-height:200px;overflow-y:auto;background:#05050f;border:1px solid rgba(0,243,255,.2);border-radius:8px;padding:8px;margin-bottom:12px;">
                <em style="color:rgba(0,243,255,.5)">Awaiting AI datastream…</em>
            </div>
            <h2>Traffic Control</h2>
            <div id="tl-panel"><em style="font-size:.78rem;color:#00f3ff; opacity: 0.5;">Awaiting datastream…</em></div>
            <div id="log-wrap">
                <h2>System Log</h2>
                <div id="log"></div>
            </div>
        </aside>
    </div>

    <!-- Stats and Controls Overlay -->
    <div id="controls" class="text-sm w-64">
        <h2 class="text-lg font-bold text-cyan-300 mb-2 border-b border-cyan-500 pb-2 tracking-widest uppercase">Network Data</h2>
        <div class="flex justify-between mt-2"><span class="text-fuchsia-400">Edges:</span> <span id="stat-edges"
                class="text-cyan-100 font-mono font-bold">0</span></div>
        <div class="flex justify-between mt-1"><span class="text-fuchsia-400">Junctions:</span> <span id="stat-junctions"
                class="text-cyan-100 font-mono font-bold">0</span></div>
        <div class="flex justify-between mt-1 mb-4"><span class="text-fuchsia-400">Active Units:</span> <span
                id="stat-cars" class="text-cyan-100 font-mono font-bold">0</span></div>
        <button id="btn-reset"
            class="mt-6 w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white py-2 rounded-lg font-bold transition shadow-[0_0_15px_rgba(255,0,170,0.5)] border border-fuchsia-400 tracking-wider">
            REBOOT SYSTEM
        </button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, controls, composer;
        let networkGroup = new THREE.Group();
        let mapEnvironmentGroup = new THREE.Group();
        let lanePaths = [];
        let lastTime = 0;
        let animationFrameId;

        // WebSocket / Live vehicle state
        let ws;
        const SUMO_CENTER_X = 883.8;
        const SUMO_CENTER_Y = 687.8;
        const VEH_MAX = 5000;
        let vehMesh;
        const dummy = new THREE.Object3D();

        // UI Elements
        const controlsPanel = document.getElementById('controls');
        const badge = document.getElementById('status-badge');
        const hudStep = document.getElementById('hud-step');
        const hudVeh = document.getElementById('hud-veh');
        const hudTl = document.getElementById('hud-tl');
        const tlPanel = document.getElementById('tl-panel');
        const logEl = document.getElementById('log');
        const canvasContainer = document.getElementById('canvas-container');

        // === AI overlay (keep in sync with index.html) ===
        const aiBadge = document.getElementById('ai-badge');
        const modelSelect = document.getElementById('model-select');
        const aiDecisionsEl = document.getElementById('ai-decisions');
        const aiDecModelEl = document.getElementById('ai-dec-model');
        const MODEL_LABEL = { v1: 'V1 · DQN', v2: 'V2 · MAPPO', v3: 'V3 · FRAP-DQN' };
        let _modelsPopulated = '';
        if (modelSelect) modelSelect.addEventListener('change', () => {
            const m = modelSelect.value;
            if (m && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'selectModel', model: m }));
                wsLog(`→ selectModel(${m})`);
            }
        });
        function aiColors(status) {
            const s = status || 'idle';
            if (s === 'active') return ['rgba(0,243,255,.18)', '#00f3ff'];
            if (s.startsWith('fallback')) return ['rgba(255,0,170,.20)', '#ff00aa'];
            if (s === 'manual_override') return ['rgba(252,238,10,.20)', '#fcee0a'];
            return ['rgba(0,243,255,.10)', 'rgba(0,243,255,.5)'];
        }
        function updateAiBadge(summary) {
            if (!summary || !aiBadge) return;
            const active = summary.active || 0, total = summary.total || 0;
            const [bg, fg] = aiColors(active > 0 ? 'active' : 'idle');
            aiBadge.style.background = bg; aiBadge.style.color = fg;
            aiBadge.textContent = `AI: ${active}/${total} active`;
        }
        function updateModelSelect(summary) {
            if (!modelSelect) return;
            const avail = (summary && summary.availableModels) || [];
            const key = avail.join(',');
            if (key !== _modelsPopulated) {
                modelSelect.innerHTML = '';
                if (avail.length === 0) {
                    const o = document.createElement('option');
                    o.value = ''; o.textContent = '(none loaded)';
                    modelSelect.appendChild(o);
                }
                for (const m of avail) {
                    const o = document.createElement('option');
                    o.value = m; o.textContent = MODEL_LABEL[m] || m;
                    modelSelect.appendChild(o);
                }
                _modelsPopulated = key;
            }
            if (summary && summary.activeModel && document.activeElement !== modelSelect) {
                modelSelect.value = summary.activeModel;
            }
        }
        function renderDecisions(log, activeModel) {
            if (!aiDecisionsEl) return;
            if (aiDecModelEl) aiDecModelEl.textContent = activeModel ? `(${(MODEL_LABEL[activeModel] || activeModel)})` : '';
            if (!log || log.length === 0) return;
            const rows = log.slice().reverse().map(d => {
                if (d.event) return `<div style="color:#fcee0a;">⟳ step ${d.step} · ${d.event}</div>`;
                return `<div><span style="color:rgba(0,243,255,.5);">step ${d.step}</span> · `
                    + `light <span style="color:#e0faff;">${d.light}</span> `
                    + `→ <span style="color:#00f3ff;">green slot ${d.slot}</span></div>`;
            });
            aiDecisionsEl.innerHTML = rows.join('');
        }
        // === end AI overlay ===

        // Cyberpunk Palette
        const C_CYAN = 0x00f3ff;
        const C_MAGENTA = 0xff00aa;
        const C_YELLOW = 0xfcee0a;
        const C_DARK = 0x050510;
        const C_SKY = 0x3a1c71;
        const C_ASPHALT = 0x030303;
        const C_GROUND = 0x1a153a;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(C_SKY);
            // Removed fog to allow clear viewing from a distance
            // scene.fog = new THREE.FogExp2(C_SKY, 0.0006);

            camera = new THREE.PerspectiveCamera(50, canvasContainer.clientWidth / canvasContainer.clientHeight, 1, 10000);
            camera.position.set(0, 800, 800);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" }); // AA disabled as bloom handles edges nicely
            renderer.setSize(canvasContainer.clientWidth, canvasContainer.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            canvasContainer.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;

            // Cyberpunk Lighting Setup
            const ambientLight = new THREE.AmbientLight(0x5a3590, 3.5); // Brighter purple ambient
            scene.add(ambientLight);
            
            const moonLight = new THREE.DirectionalLight(0x8888ff, 2.0); // Brighter moonlight
            moonLight.position.set(1000, 2000, 1000);
            moonLight.castShadow = true;
            const d = 2000;
            moonLight.shadow.camera.left = -d;
            moonLight.shadow.camera.right = d;
            moonLight.shadow.camera.top = d;
            moonLight.shadow.camera.bottom = -d;
            moonLight.shadow.camera.far = 5000;
            moonLight.shadow.mapSize.width = 2048;
            moonLight.shadow.mapSize.height = 2048;
            scene.add(moonLight);

            scene.add(mapEnvironmentGroup);
            scene.add(networkGroup);

            // Tron-style glowing light cycle vehicles
            const vehGeo = new THREE.BoxGeometry(4, 1.5, 8);
            const vehMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Emits pure unlit color for bloom
            vehMesh = new THREE.InstancedMesh(vehGeo, vehMat, VEH_MAX);
            vehMesh.count = 0;
            vehMesh.castShadow = true;
            vehMesh.receiveShadow = true;
            scene.add(vehMesh);

            // Setup Cyberpunk Bloom Post-Processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(canvasContainer.clientWidth, canvasContainer.clientHeight),
                1.4,   // Bloom Strength
                0.4,   // Bloom Radius
                0.2    // Bloom Threshold (Only pure bright colors will glow)
            );

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            loadCustomMap();

            window.addEventListener('resize', onWindowResize);

            controlsPanel.style.display = 'block';

            // Start render loop and WebSocket
            requestAnimationFrame(animate);
            connectWebSocket();

            // Wire up the reset button
            document.getElementById('btn-reset').addEventListener('click', resetSimulation);
        }

        // --- CUSTOM MAP INTEGRATION ---
        function loadCustomMap() {
            // --- GLOBAL BUILDING WINDOW TEXTURES ---
            function createBuildingTexture(bgColor, windowColor) {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, 64, 64);
                
                ctx.fillStyle = windowColor; 
                for (let x = 4; x < 64; x += 16) {
                    for (let y = 4; y < 64; y += 16) {
                        // Some windows are dark to give a realistic skyline feel
                        if(Math.random() > 0.35) {
                            ctx.fillRect(x + 1, y + 1, 6, 8);
                        }
                    }
                }
                
                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;
                tex.magFilter = THREE.NearestFilter;
                tex.colorSpace = THREE.SRGBColorSpace;
                return tex;
            }
            
            // Multiple neon variations
            const bTexCyan = createBuildingTexture('#050508', '#00f3ff');
            const bTexPink = createBuildingTexture('#050508', '#ff00aa');
            const bTexYellow = createBuildingTexture('#050508', '#fcee0a');
            const tTexBase = createBuildingTexture('#020202', '#00f3ff'); 
            
            const roofBMat = new THREE.MeshStandardMaterial({ color: 0x050508, roughness: 0.8 });
            const roofTMat = new THREE.MeshStandardMaterial({ color: 0x020202, roughness: 0.8 });

            // Synthwave Grid Floor
            const gridHelper = new THREE.GridHelper(1000, 100, 0x111133, 0x111133);
            gridHelper.position.y = 0.05;
            mapEnvironmentGroup.add(gridHelper);

            // --- GLOBAL TRAFFIC LIGHT HELPER ---
            function createIntersectionLights(group, cx, cz, wX, wZ) {
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.6 });
                const boxMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.8 });

                const cornerOffset = 1.5;
                const dX = (wX / 2) + cornerOffset;
                const dZ = (wZ / 2) + cornerOffset;

                const positions = [
                    { x: cx + dX, z: cz + dZ, rot: 0 },             
                    { x: cx - dX, z: cz - dZ, rot: Math.PI },       
                    { x: cx - dX, z: cz + dZ, rot: -Math.PI / 2 },  
                    { x: cx + dX, z: cz - dZ, rot: Math.PI / 2 }    
                ];

                positions.forEach(pos => {
                    const tlGroup = new THREE.Group();
                    tlGroup.position.set(pos.x, 0, pos.z);
                    tlGroup.rotation.y = pos.rot;

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 5.5), poleMat);
                    pole.position.y = 2.75;
                    pole.castShadow = true;
                    tlGroup.add(pole);

                    const armLength = 4.5;
                    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, armLength), poleMat);
                    arm.rotation.z = Math.PI / 2;
                    arm.position.set(-armLength / 2 + 0.1, 5.2, 0);
                    arm.castShadow = true;
                    tlGroup.add(arm);

                    const box = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.6, 0.6), boxMat);
                    box.position.set(-armLength + 0.6, 5.2, 0);
                    box.castShadow = true;
                    tlGroup.add(box);

                    // High intensity basic materials to trigger bloom
                    const colors = [0xff2222, 0xffbb00, 0x22ff22];
                    for (let i = 0; i < 3; i++) {
                        const light = new THREE.Mesh(
                            new THREE.PlaneGeometry(0.35, 0.35),
                            new THREE.MeshBasicMaterial({ color: colors[i] }) 
                        );
                        light.position.set(-armLength + 0.6, 5.2 + 0.45 - i * 0.45, 0.31);
                        tlGroup.add(light);
                    }
                    group.add(tlGroup);
                });
            }

            // =========================================================
            // SECTION 1: LEFT SIDE
            // =========================================================
            function buildSection1Left() {
                const group = new THREE.Group();
                const S = 1.6;

                const ground = new THREE.Mesh(new THREE.BoxGeometry(90 * S + 15, 50, 285), new THREE.MeshStandardMaterial({ color: C_GROUND, roughness: 0.9 }));
                ground.position.set(-7.5, -25, 27.5); 
                ground.receiveShadow = true;
                group.add(ground);

                const roadMat = new THREE.MeshStandardMaterial({ color: C_ASPHALT, roughness: 0.6, metalness: 0.2, polygonOffset: true, polygonOffsetFactor: -1 });
                const lineMaterial = new THREE.MeshBasicMaterial({ color: C_CYAN }); // Glowing neon cyan

                const sec1RoadBounds = [];

                function drawRoad(x1, z1, x2, z2, width, isMain = false) {
                    const dx = x2 - x1, dz = z2 - z1;
                    const length = Math.sqrt(dx * dx + dz * dz);

                    sec1RoadBounds.push({ minX: Math.min(x1, x2) - width / 2, maxX: Math.max(x1, x2) + width / 2, minZ: Math.min(z1, z2) - width / 2, maxZ: Math.max(z1, z2) + width / 2 });

                    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(length + width, width), roadMat);
                    mesh.position.set((x1 + x2) / 2, 0.1, (z1 + z2) / 2); 
                    mesh.rotation.x = -Math.PI / 2;
                    const angle = Math.atan2(dz, dx);
                    mesh.rotation.z = -angle; 
                    mesh.receiveShadow = true;
                    group.add(mesh);

                    const dashLength = 3, gapLength = 4;
                    const numDashes = Math.floor(length / (dashLength + gapLength));
                    const startOffset = -length / 2 + dashLength;
                    const cx = (x1 + x2) / 2;
                    const cz = (z1 + z2) / 2;

                    if (isMain) {
                        const yellowMat = new THREE.MeshBasicMaterial({ color: C_MAGENTA }); // Neon pink for yellow lines
                        for (let offset of [-0.4, 0.4]) {
                            const yGeo = new THREE.PlaneGeometry(length, 0.4);
                            const yMesh = new THREE.Mesh(yGeo, yellowMat);
                            yMesh.rotation.x = -Math.PI / 2;
                            yMesh.rotation.z = -angle; 
                            yMesh.position.set(cx - Math.sin(angle) * offset, 0.8, cz + Math.cos(angle) * offset);
                            group.add(yMesh);
                        }
                        const dashOffsets = [-6, -4, -2, 2, 4, 6];
                        for (let i = 0; i < numDashes; i++) {
                            const currentOffset = startOffset + i * (dashLength + gapLength);
                            for (let dOff of dashOffsets) {
                                const dashGeo = new THREE.PlaneGeometry(dashLength, 0.3);
                                const dash = new THREE.Mesh(dashGeo, lineMaterial);
                                dash.rotation.x = -Math.PI / 2;
                                dash.rotation.z = -angle; 
                                dash.position.set(
                                    cx + Math.cos(angle) * currentOffset - Math.sin(angle) * dOff,
                                    0.8,
                                    cz + Math.sin(angle) * currentOffset + Math.cos(angle) * dOff
                                );
                                group.add(dash);
                            }
                        }
                    } else {
                        for (let i = 0; i < numDashes; i++) {
                            const dashGeo = new THREE.PlaneGeometry(dashLength, 0.3);
                            const dash = new THREE.Mesh(dashGeo, lineMaterial);
                            dash.rotation.x = -Math.PI / 2;
                            dash.rotation.z = -angle; 

                            const currentOffset = startOffset + i * (dashLength + gapLength);
                            dash.position.set(
                                cx + Math.cos(angle) * currentOffset,
                                0.8, 
                                cz + Math.sin(angle) * currentOffset
                            );
                            group.add(dash);
                        }
                    }
                }

                drawRoad(-45 * S, 0, 45 * S, 0, 10 * S, true);
                drawRoad(-12 * S - 5 - 0.10, -110, -12 * S - 5 + 2.565, 165, 4.5 * S); 
                drawRoad(15 * S + 0.097, -110, 15 * S + 2.592, 165, 4.5 * S); 
                drawRoad(-25 * S - 10, 0, -25 * S - 10, -110, 2.5 * S);  
                drawRoad(-25 * S - 10, -15 * S - 5 - 30, -12 * S - 5, -15 * S - 5 - 30, 2.5 * S); 
                drawRoad(-12 * S - 5, 20 * S + 66, 15 * S, 20 * S + 66, 2.5 * S);   
                drawRoad(15 * S, -20 * S - 30, 32 * S, -20 * S - 30, 2.5 * S); 

                function isOverlappingRoadSec1(bx, bz, bw, bd) {
                    const bMinX = bx - bw / 2 - 2; const bMaxX = bx + bw / 2 + 2;
                    const bMinZ = bz - bd / 2 - 2; const bMaxZ = bz + bd / 2 + 2;
                    for (let bounds of sec1RoadBounds) {
                        if (bMinX < bounds.maxX && bMaxX > bounds.minX && bMinZ < bounds.maxZ && bMaxZ > bounds.minZ) return true;
                    }
                    return false;
                }

                const texVariants = [bTexCyan, bTexPink, bTexYellow];

                for (let x = -40 * S; x <= 40 * S; x += 8 * S) {
                    for (let z = -60 * S; z <= 90 * S; z += 8 * S) {
                        const bWidth = (3 + Math.random() * 4) * S;
                        const bDepth = (3 + Math.random() * 4) * S;
                        const bx = x + (Math.random() * 2 * S - S);
                        const bz = z + (Math.random() * 2 * S - S);

                        if (!isOverlappingRoadSec1(bx, bz, bWidth, bDepth) && Math.random() > 0.4) {
                            const isTower = Math.random() > 0.85;
                            const height = (isTower ? 15 + Math.random() * 20 : 4 + Math.random() * 6) * S;

                            const repAvg = Math.max(1, Math.round((bWidth + bDepth) / (5 * S)));
                            const repY = Math.max(1, Math.round(height / (3 * S)));
                            
                            const tex = isTower ? tTexBase.clone() : texVariants[Math.floor(Math.random() * texVariants.length)].clone();
                            tex.repeat.set(repAvg, repY);
                            tex.needsUpdate = true;

                            // Adding emissive map identical to standard map guarantees window parts bloom spectacularly
                            const faceMat = new THREE.MeshStandardMaterial({ 
                                map: tex, 
                                emissiveMap: tex, 
                                emissive: 0xffffff, 
                                emissiveIntensity: 1.5, 
                                roughness: isTower ? 0.2 : 0.6,
                                metalness: 0.5
                            });
                            const topMat = isTower ? roofTMat : roofBMat;

                            const bldg = new THREE.Mesh(new THREE.BoxGeometry(bWidth, height, bDepth), [faceMat, faceMat, topMat, topMat, faceMat, faceMat]);
                            bldg.position.set(bx, height / 2, bz);
                            bldg.castShadow = bldg.receiveShadow = true;
                            group.add(bldg);
                        }
                    }
                }

                createIntersectionLights(group, -12 * S - 5, 0, 4.5 * S, 16); 
                createIntersectionLights(group, 15 * S, 0, 4.5 * S, 16);

                return group;
            }

            // =========================================================
            // SECTION 2: MIDDLE 
            // =========================================================
            function buildSection2Middle() {
                const group = new THREE.Group();

                const groundGeo = new THREE.BoxGeometry(94, 50, 285);

                const ground = new THREE.Mesh(groundGeo, groundMat);
                ground.position.set(-2, -25, 27.5); 
                ground.receiveShadow = true;
                group.add(ground);

                const roadMaterial = new THREE.MeshStandardMaterial({ color: C_ASPHALT, roughness: 0.6, metalness: 0.2 });
                const lineMaterial = new THREE.MeshBasicMaterial({ color: C_CYAN });

                const roadSegments = [
                    { type: 'h', x: 3, z: 0, length: 104, width: 16, isMain: true }, 
                    { type: 'v', x: -45, z: 27.5, length: 285, width: 8 }, 
                    { type: 'v', x: 5, z: 27.5, length: 285, width: 8 }, 
                    { type: 'h', x: 32.5, z: 102.5, length: Math.sqrt(53 * 53 + 5 * 5), width: 6, angle: Math.atan2(5, 53) }, 
                    { type: 'h', x: 16.5, z: -49, length: 45, width: 6, lines: true },  
                    { type: 'v', x: -4.5, z: -81.5, length: 67, width: 4, lines: true }, 
                    { type: 'v', x: 37.5, z: -81.5, length: 67, width: 4, lines: true }  
                ];

                let baseOffset = 0.0; 
                roadSegments.forEach(seg => {
                    const geo = new THREE.BoxGeometry(seg.type === 'h' ? seg.length : seg.width, 0.2, seg.type === 'h' ? seg.width : seg.length);
                    const roadMesh = new THREE.Mesh(geo, roadMaterial);
                    roadMesh.position.set(seg.x, baseOffset, seg.z);
                    if (seg.angle) roadMesh.rotation.y = -seg.angle;
                    roadMesh.receiveShadow = roadMesh.castShadow = true;
                    group.add(roadMesh);

                    if (seg.isMain) {
                        const yellowMat = new THREE.MeshBasicMaterial({ color: C_MAGENTA });
                        for (let offset of [-0.4, 0.4]) {
                            const yGeo = new THREE.PlaneGeometry(seg.length, 0.4);
                            const yMesh = new THREE.Mesh(yGeo, yellowMat);
                            yMesh.position.set(seg.x, baseOffset + 0.75, seg.z + offset);
                            yMesh.rotation.x = -Math.PI / 2;
                            group.add(yMesh);
                        }
                        const dashLength = 3, gapLength = 4;
                        const numDashes = Math.floor(seg.length / (dashLength + gapLength));
                        const startOffset = -seg.length / 2 + dashLength;
                        const dashOffsets = [-6, -4, -2, 2, 4, 6];
                        for (let i = 0; i < numDashes; i++) {
                            const currentOffset = startOffset + i * (dashLength + gapLength);
                            for (let dOff of dashOffsets) {
                                const dashGeo = new THREE.PlaneGeometry(dashLength, 0.3);
                                const dash = new THREE.Mesh(dashGeo, lineMaterial);
                                dash.rotation.x = -Math.PI / 2;
                                dash.position.set(seg.x + currentOffset, baseOffset + 0.75, seg.z + dOff);
                                group.add(dash);
                            }
                        }
                    } else if (seg.width >= 6 || seg.lines) {
                        const dashLength = 3, gapLength = 4;
                        const numDashes = Math.floor(seg.length / (dashLength + gapLength));
                        const startOffset = -seg.length / 2 + dashLength;

                        for (let i = 0; i < numDashes; i++) {
                            const dashGeo = new THREE.PlaneGeometry(seg.type === 'h' ? dashLength : 0.3, seg.type === 'h' ? 0.3 : dashLength);
                            const dash = new THREE.Mesh(dashGeo, lineMaterial);
                            dash.rotation.x = -Math.PI / 2;
                            if (seg.angle) dash.rotation.z = seg.angle;
                            const currentOffset = startOffset + i * (dashLength + gapLength);

                            if (seg.type === 'h') {
                                if (seg.angle) dash.position.set(seg.x + Math.cos(seg.angle) * currentOffset, baseOffset + 0.75, seg.z + Math.sin(seg.angle) * currentOffset);
                                else dash.position.set(seg.x + currentOffset, baseOffset + 0.75, seg.z); 
                            } else {
                                dash.position.set(seg.x, baseOffset + 0.75, seg.z + currentOffset); 
                            }
                            group.add(dash);
                        }
                    }
                    baseOffset += 0.01;
                });

                function isOverlappingRoad(bx, bz, bw, bd) {
                    const bMinX = bx - bw / 2 - 2; const bMaxX = bx + bw / 2 + 2;
                    const bMinZ = bz - bd / 2 - 2; const bMaxZ = bz + bd / 2 + 2;

                    for (let seg of roadSegments) {
                        const rMinX = seg.x - (seg.type === 'h' ? seg.length / 2 : seg.width / 2);
                        const rMaxX = seg.x + (seg.type === 'h' ? seg.length / 2 : seg.width / 2);
                        let rMinZ = seg.z - (seg.type === 'h' ? seg.width / 2 : seg.length / 2);
                        let rMaxZ = seg.z + (seg.type === 'h' ? seg.width / 2 : seg.length / 2);

                        if (seg.angle) {
                            const zOffset = Math.abs((seg.length / 2) * Math.sin(seg.angle));
                            rMinZ -= zOffset; rMaxZ += zOffset;
                        }
                        if (bMinX < rMaxX && bMaxX > rMinX && bMinZ < rMaxZ && bMaxZ > rMinZ) return true;
                    }
                    return false;
                }

                const texVariants = [bTexCyan, bTexPink, bTexYellow];

                for (let x = -45; x <= 45; x += 8) {
                    for (let z = -100; z <= 150; z += 8) {
                        if (!isOverlappingRoad(x, z, 7, 7) && Math.random() > 0.4) {
                            const isTower = Math.random() > 0.85;
                            const height = isTower ? 15 + Math.random() * 20 : 4 + Math.random() * 6;
                            const width = 3 + Math.random() * 4;
                            const depth = 3 + Math.random() * 4;
                            
                            const repAvg = Math.max(1, Math.round((width + depth) / 5));
                            const repY = Math.max(1, Math.round(height / 3));

                            const tex = isTower ? tTexBase.clone() : texVariants[Math.floor(Math.random() * texVariants.length)].clone();
                            tex.repeat.set(repAvg, repY);
                            tex.needsUpdate = true;

                            const faceMat = new THREE.MeshStandardMaterial({ 
                                map: tex, 
                                emissiveMap: tex, 
                                emissive: 0xffffff, 
                                emissiveIntensity: 1.5, 
                                roughness: isTower ? 0.2 : 0.6,
                                metalness: 0.5
                            });
                            const topMat = isTower ? roofTMat : roofBMat;

                            const bldg = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), [faceMat, faceMat, topMat, topMat, faceMat, faceMat]);
                            bldg.position.set(x + (Math.random() * 2 - 1), height / 2, z + (Math.random() * 2 - 1));
                            bldg.castShadow = bldg.receiveShadow = true;
                            group.add(bldg);
                        }
                    }
                }

                createIntersectionLights(group, -45, 0, 8, 16); 
                createIntersectionLights(group, 5, 0, 8, 16);   
                createIntersectionLights(group, 5, 100, 8, 6);  

                return group;
            }

            // =========================================================
            // SECTION 3: RIGHT SIDE
            // =========================================================
            function buildSection3Right() {
                const group = new THREE.Group();

                const matGround = new THREE.MeshStandardMaterial({ color: C_GROUND, roughness: 0.9, metalness: 0.1 }); 
                const matAsphalt = new THREE.MeshStandardMaterial({ color: C_ASPHALT, roughness: 0.6, metalness: 0.2, side: THREE.DoubleSide });
                const matAsphaltUpper = new THREE.MeshStandardMaterial({
                    color: C_ASPHALT, roughness: 0.6, metalness: 0.2, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: -1.0, polygonOffsetUnits: -4.0
                });
                const matConcrete = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });
                const matWhiteDashed = new THREE.LineDashedMaterial({ color: C_CYAN, dashSize: 2, gapSize: 2 });

                const bridgeLength = 195; 
                const bridgeCenterX = 52.5; 
                const roadWidthSide = 8;
                const rightRoadWidthSide = 11; 
                const roadWidthMain = 16;
                const rampWidth = 5;
                const leftSideRoadX = -45;
                const rightSideRoadX = 53.5; 
                const rightRoadLength = 285; 
                const rightRoadZOffset = 27.5; 
                const leftRoadLength = 285; 
                const leftRoadZOffset = 27.5; 

                const groundLeft = new THREE.Mesh(new THREE.BoxGeometry(14, 50, 285), matGround);
                groundLeft.position.set(-48, -25, 27.5); 
                groundLeft.receiveShadow = true;

                const groundRight = new THREE.Mesh(new THREE.BoxGeometry(109, 50, 285), matGround);
                groundRight.position.set(95.5, -25, 27.5); 
                groundRight.receiveShadow = true;

                const trenchFloor = new THREE.Mesh(new THREE.BoxGeometry(82, 50, 285), matGround);
                trenchFloor.position.set(0, -25, 27.5); 
                trenchFloor.receiveShadow = true;

                group.add(groundLeft, groundRight, trenchFloor); 

                const splitFreewayWidth = 8;
                const freewayLeft = new THREE.Mesh(new THREE.PlaneGeometry(splitFreewayWidth, 285), matAsphalt);
                freewayLeft.rotation.x = -Math.PI / 2;
                freewayLeft.position.set(-11, 0.12, 27.5); 
                freewayLeft.receiveShadow = true;

                const freewayRight = new THREE.Mesh(new THREE.PlaneGeometry(splitFreewayWidth, 285), matAsphalt);
                freewayRight.rotation.x = -Math.PI / 2;
                freewayRight.position.set(9, 0.12, 27.5); 
                freewayRight.receiveShadow = true;

                group.add(freewayLeft, freewayRight);

                function createLine(points, material, dashed = false) {
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(geometry, material);
                    if (dashed) line.computeLineDistances();
                    return line;
                }

                const freewayLines = new THREE.Group();
                freewayLines.position.y = 0.15; 
                freewayLines.add(createLine([new THREE.Vector3(-11, 0, -115), new THREE.Vector3(-11, 0, 170)], matWhiteDashed, true));
                freewayLines.add(createLine([new THREE.Vector3(9, 0, -115), new THREE.Vector3(9, 0, 170)], matWhiteDashed, true));
                group.add(freewayLines);

                const overpassGroup = new THREE.Group();
                const bridge = new THREE.Mesh(new THREE.BoxGeometry(bridgeLength, 0.2, roadWidthMain), matConcrete);
                bridge.position.set(bridgeCenterX, 0, 0); 
                bridge.castShadow = bridge.receiveShadow = true;
                overpassGroup.add(bridge);

                const bridgeSurface = new THREE.Mesh(new THREE.PlaneGeometry(bridgeLength, roadWidthMain), matAsphaltUpper);
                bridgeSurface.rotation.x = -Math.PI / 2;
                bridgeSurface.position.set(bridgeCenterX, 0.12, 0); 
                overpassGroup.add(bridgeSurface);

                const leftSideRoad = new THREE.Mesh(new THREE.BoxGeometry(roadWidthSide, 0.2, leftRoadLength), matConcrete);
                leftSideRoad.position.set(leftSideRoadX, 0, leftRoadZOffset); 
                leftSideRoad.castShadow = leftSideRoad.receiveShadow = true;
                overpassGroup.add(leftSideRoad);

                const leftSurface = new THREE.Mesh(new THREE.PlaneGeometry(roadWidthSide, leftRoadLength), matAsphaltUpper);
                leftSurface.rotation.x = -Math.PI / 2;
                leftSurface.position.set(leftSideRoadX, 0.12, leftRoadZOffset); 
                overpassGroup.add(leftSurface);

                const rightSideRoad = new THREE.Mesh(new THREE.BoxGeometry(rightRoadWidthSide, 0.2, rightRoadLength), matConcrete);
                rightSideRoad.position.set(rightSideRoadX, 0, rightRoadZOffset); 
                rightSideRoad.castShadow = rightSideRoad.receiveShadow = true;
                overpassGroup.add(rightSideRoad);

                const rightSurface = new THREE.Mesh(new THREE.PlaneGeometry(rightRoadWidthSide, rightRoadLength), matAsphaltUpper);
                rightSurface.rotation.x = -Math.PI / 2;
                rightSurface.position.set(rightSideRoadX, 0.12, rightRoadZOffset); 
                overpassGroup.add(rightSurface);

                group.add(overpassGroup);

                const lineMaterial = new THREE.MeshBasicMaterial({ color: C_CYAN });
                const yellowMatSec3 = new THREE.MeshBasicMaterial({ color: C_MAGENTA });
                
                // Shorten lines by 4 units to prevent them from bleeding off the right edge of the map
                const linesLength = bridgeLength - 4;
                const linesCenterX = bridgeCenterX - 2;

                for (let offset of [-0.4, 0.4]) {
                    const yGeo = new THREE.PlaneGeometry(linesLength, 0.4);
                    const yMesh = new THREE.Mesh(yGeo, yellowMatSec3);
                    yMesh.rotation.x = -Math.PI / 2;
                    yMesh.position.set(linesCenterX, 0.8, offset);
                    group.add(yMesh);
                }
                const dashOffsetsSec3 = [-6, -4, -2, 2, 4, 6];
                const dlSec3 = 3, glSec3 = 4;
                const numDSec3 = Math.floor(linesLength / (dlSec3 + glSec3));
                const startOSec3 = -linesLength / 2 + dlSec3;
                for (let i = 0; i < numDSec3; i++) {
                    const currentOffset = startOSec3 + i * (dlSec3 + glSec3);
                    for (let dOff of dashOffsetsSec3) {
                        const dashGeo = new THREE.PlaneGeometry(dlSec3, 0.3);
                        const dash = new THREE.Mesh(dashGeo, lineMaterial);
                        dash.rotation.x = -Math.PI / 2;
                        dash.position.set(linesCenterX + currentOffset, 0.8, dOff);
                        group.add(dash);
                    }
                }

                function drawDashedLineSec3(type, cx, cz, length, yLevel) {
                    const numDashes = Math.floor(length / 7);
                    const startOffset = -length / 2 + 3;
                    for (let i = 0; i < numDashes; i++) {
                        const dashGeo = new THREE.PlaneGeometry(type === 'h' ? 3 : 0.3, type === 'h' ? 0.3 : 3);
                        const dash = new THREE.Mesh(dashGeo, lineMaterial);
                        dash.rotation.x = -Math.PI / 2;
                        const currentOffset = startOffset + i * 7;
                        if (type === 'h') dash.position.set(cx + currentOffset, yLevel, cz);
                        else dash.position.set(cx, yLevel, cz + currentOffset);
                        group.add(dash);
                    }
                }

                drawDashedLineSec3('v', leftSideRoadX, leftRoadZOffset, leftRoadLength, 0.8); 
                drawDashedLineSec3('v', rightSideRoadX, rightRoadZOffset, rightRoadLength, 0.8); 

                function createRampMesh(curve, width, material) {
                    const segments = 100;
                    const points = curve.getSpacedPoints(segments);
                    const vertices = []; const indices = [];
                    const up = new THREE.Vector3(0, 1, 0);

                    for (let i = 0; i <= segments; i++) {
                        const p = points[i];
                        const tangent = curve.getTangentAt(i / segments).normalize();
                        tangent.y = 0;
                        if (tangent.lengthSq() > 0.001) tangent.normalize(); else tangent.set(0, 0, 1);
                        const right = new THREE.Vector3().crossVectors(tangent, up).normalize();

                        let currentWidth = width;
                        const t = i / segments;
                        if (t < 0.2) {
                            const progress = t / 0.2;
                            currentWidth = width * (progress * progress * (3 - 2 * progress));
                        }
                        const pLeft = new THREE.Vector3().copy(p).addScaledVector(right, currentWidth / 2);
                        const pRight = new THREE.Vector3().copy(p).addScaledVector(right, -currentWidth / 2);
                        vertices.push(pLeft.x, pLeft.y, pLeft.z, pRight.x, pRight.y, pRight.z);
                    }
                    for (let i = 0; i < segments; i++) {
                        const v1 = i * 2, v2 = i * 2 + 1, v3 = (i + 1) * 2, v4 = (i + 1) * 2 + 1;
                        indices.push(v1, v2, v3, v2, v4, v3);
                    }
                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
                    geometry.setIndex(indices);
                    geometry.computeVertexNormals();

                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.castShadow = mesh.receiveShadow = true;
                    return mesh;
                }

                function createSBendCurve(pStart, pEnd, outwardDir) {
                    const points = [pStart.clone()];
                    const zSign = Math.sign(pEnd.z - pStart.z);
                    points.push(new THREE.Vector3(pStart.x, pStart.y, pStart.z + zSign * 15));

                    const amplitude = 6.0; 
                    for (let i = 1; i <= 2; i++) {
                        const t = i / 3;
                        const smoothT = t * t * (3 - 2 * t); 
                        const x = THREE.MathUtils.lerp(pStart.x, pEnd.x, smoothT);
                        const y = THREE.MathUtils.lerp(pStart.y, pEnd.y, t);
                        const z = THREE.MathUtils.lerp(pStart.z, pEnd.z, t);

                        let xOffset = 0;
                        if (i === 1) xOffset = amplitude * outwardDir * 0.75; 
                        if (i === 2) xOffset = -amplitude * outwardDir * 0.375; 

                        points.push(new THREE.Vector3(x + xOffset, y, z));
                    }
                    points.push(new THREE.Vector3(pEnd.x - Math.sign(pEnd.x) * 5, pEnd.y, pEnd.z - zSign * 5));
                    points.push(pEnd.clone());

                    return new THREE.CatmullRomCurve3(points, false, 'centripetal', 0.8);
                }

                const rOffsetLeft = 15.5; const rOffsetRight = 13.5; const rampMergeZ = 80;
                const curveTL = createSBendCurve(new THREE.Vector3(-rOffsetLeft, 0.12, -rampMergeZ - 20), new THREE.Vector3(-41, 0.12, -7), 1);
                const curveBL = createSBendCurve(new THREE.Vector3(-rOffsetLeft, 0.12, rampMergeZ + 30), new THREE.Vector3(-41, 0.12, 7), 1);
                const curveTR = createSBendCurve(new THREE.Vector3(rOffsetRight, 0.12, -rampMergeZ - 15), new THREE.Vector3(41, 0.12, -7), -1);
                const curveBR = createSBendCurve(new THREE.Vector3(rOffsetRight, 0.12, rampMergeZ + 15), new THREE.Vector3(41, 0.12, 7), -1);

                group.add(
                    createRampMesh(curveTL, rampWidth, matAsphalt), createRampMesh(curveBL, rampWidth, matAsphalt),
                    createRampMesh(curveTR, rampWidth, matAsphalt), createRampMesh(curveBR, rampWidth, matAsphalt)
                );

                function createRampLine(curve) {
                    const allPoints = curve.getSpacedPoints(50);
                    const lifted = allPoints.slice(10).map(p => new THREE.Vector3(p.x, p.y + 0.05, p.z));
                    return createLine(lifted, matWhiteDashed, true);
                }

                group.add(createRampLine(curveTL), createRampLine(curveBL), createRampLine(curveTR), createRampLine(curveBR));
                createIntersectionLights(group, leftSideRoadX, 0, 8, 16);
                createIntersectionLights(group, rightSideRoadX, 0, rightRoadWidthSide, 16); 

                return group;
            }

            // =========================================================
            // ASSEMBLY
            // =========================================================
            const leftGroup = buildSection1Left(); leftGroup.position.x = -121; mapEnvironmentGroup.add(leftGroup);
            const middleGroup = buildSection2Middle(); middleGroup.position.x = 0; mapEnvironmentGroup.add(middleGroup);
            const rightGroup = buildSection3Right(); rightGroup.position.x = 100; mapEnvironmentGroup.add(rightGroup);

            mapEnvironmentGroup.scale.set(4, 4, 2);
            mapEnvironmentGroup.rotation.y = THREE.MathUtils.degToRad(0.25);
            mapEnvironmentGroup.position.set(-100, 0, -156);
        }

        // --- SUMO NETWORK PARSER (FALLBACK) ---
        function parseSumoXML(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");

            const locationNode = xmlDoc.querySelector("location");
            let convBoundary = [0, 0, 0, 0];
            if (locationNode && locationNode.getAttribute("convBoundary")) convBoundary = locationNode.getAttribute("convBoundary").split(',').map(Number);
            const centerX = (convBoundary[0] + convBoundary[2]) / 2; const centerY = (convBoundary[1] + convBoundary[3]) / 2;

            const lanes = xmlDoc.querySelectorAll("lane");
            const lanePositions = []; lanePaths = []; let laneCount = 0;

            lanes.forEach(lane => {
                const shapeStr = lane.getAttribute("shape");
                if (!shapeStr) return;
                laneCount++;
                const points = shapeStr.split(' ').map(p => {
                    const coords = p.split(',');
                    return new THREE.Vector3(parseFloat(coords[0]) - centerX, coords.length > 2 ? parseFloat(coords[2]) + 0.6 : 0.6, -(parseFloat(coords[1]) - centerY));
                });
                for (let i = 0; i < points.length - 1; i++) {
                    lanePositions.push(points[i].x, points[i].y, points[i].z);
                    lanePositions.push(points[i + 1].x, points[i + 1].y, points[i + 1].z);
                }
            });

            // Glowing magenta fallback network lines
            const laneGeometry = new THREE.BufferGeometry();
            laneGeometry.setAttribute('position', new THREE.Float32BufferAttribute(lanePositions, 3));
            const laneMaterial = new THREE.LineBasicMaterial({ color: C_MAGENTA, linewidth: 2, transparent: true, opacity: 0.4 });
            const laneLines = new THREE.LineSegments(laneGeometry, laneMaterial);
            networkGroup.add(laneLines);

            const junctions = xmlDoc.querySelectorAll("junction");
            const junctionPositions = []; let junctionCount = 0;
            junctions.forEach(j => {
                const shapeStr = j.getAttribute("shape");
                if (!shapeStr) return;
                junctionCount++;
                const points = shapeStr.split(' ').map(p => { const coords = p.split(','); return new THREE.Vector3(parseFloat(coords[0]) - centerX, 0.65, -(parseFloat(coords[1]) - centerY)); });
                for (let i = 0; i < points.length; i++) {
                    const next = (i + 1) % points.length;
                    junctionPositions.push(points[i].x, points[i].y, points[i].z);
                    junctionPositions.push(points[next].x, points[next].y, points[next].z);
                }
            });

            const junctionGeometry = new THREE.BufferGeometry();
            junctionGeometry.setAttribute('position', new THREE.Float32BufferAttribute(junctionPositions, 3));
            const junctionMaterial = new THREE.LineBasicMaterial({ color: C_CYAN, transparent: true, opacity: 0.3 }); 
            const junctionLines = new THREE.LineSegments(junctionGeometry, junctionMaterial);
            networkGroup.add(junctionLines);

            document.getElementById('stat-edges').innerText = laneCount;
            document.getElementById('stat-junctions').innerText = junctionCount;
            const maxView = Math.max(convBoundary[2] - convBoundary[0], convBoundary[3] - convBoundary[1]);
            camera.position.set(0, maxView * 0.8, maxView * 0.3);
            controls.target.set(0, 0, 0);
        }

        // --- WEBSOCKET CLIENT ---
        function wsLog(msg, cls = '') {
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            if (cls) d.className = cls;
            logEl.appendChild(d);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8765');
            ws.onopen = () => {
                badge.textContent = '● Online';
                badge.classList.add('connected');
                wsLog('Connected to SUMO main server');
            };
            ws.onclose = () => {
                badge.textContent = '● Offline';
                badge.classList.remove('connected');
                wsLog('Connection lost — reconnecting...', 'err');
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = () => { };
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'step') handleStep(msg);
                if (msg.type === 'error') wsLog(`SYS_ERR: ${msg.message}`, 'err');
            };
        }

        function handleStep(msg) {
            hudStep.textContent = msg.step;
            hudVeh.textContent = msg.vehicles.length;
            hudTl.textContent = msg.trafficLights.length;
            document.getElementById('stat-cars').innerText = msg.vehicles.length;

            const count = Math.min(msg.vehicles.length, VEH_MAX);
            vehMesh.count = count;

            for (let i = 0; i < count; i++) {
                const v = msg.vehicles[i];
                dummy.position.set(v.x - SUMO_CENTER_X, 0.75, -(v.y - SUMO_CENTER_Y));
                dummy.rotation.y = -THREE.MathUtils.degToRad(v.angle);
                const s = 1 + v.speed * 0.02;
                dummy.scale.set(s, 1, s);
                dummy.updateMatrix();
                vehMesh.setMatrixAt(i, dummy.matrix);

                // Cyberpunk Color scale for speed (Cyan -> Hot Pink)
                const speedRatio = Math.min(v.speed / 20, 1.0);
                const col = new THREE.Color().lerpColors(new THREE.Color(C_CYAN), new THREE.Color(C_MAGENTA), speedRatio);
                vehMesh.setColorAt(i, col);
            }
            vehMesh.instanceMatrix.needsUpdate = true;
            if (vehMesh.instanceColor) vehMesh.instanceColor.needsUpdate = true;

            updateAiBadge(msg.aiSummary);
            updateModelSelect(msg.aiSummary);
            renderDecisions(msg.decisionsLog, msg.aiSummary && msg.aiSummary.activeModel);
            updateTLPanel(msg.trafficLights, msg.ai);
        }

        // --- Traffic-Light Sidebar ---
        let knownTLs = {};
        function updateTLPanel(tls, ai) {
            ai = ai || {};
            for (const tl of tls) {
                if (!knownTLs[tl.id]) {
                    const card = document.createElement('div');
                    card.className = 'tl-card';
                    card.innerHTML = `
                        <div>
                            <div class="tl-id">${tl.id}</div>
                            <div class="tl-state" id="tl-state-${tl.id}">${tl.state}</div>
                            <div class="tl-state" id="tl-ai-${tl.id}" style="margin-top:3px;font-size:.7rem;padding:2px 8px;border-radius:12px;display:inline-block;">AI: —</div>
                        </div>
                        <div class="tl-btns" id="tl-btns-${tl.id}"></div>`;
                    if (tlPanel.querySelector('em')) tlPanel.innerHTML = '';
                    tlPanel.appendChild(card);

                    const btnsEl = document.getElementById(`tl-btns-${tl.id}`);
                    for (let p = 0; p < 4; p++) {
                        const btn = document.createElement('button');
                        btn.textContent = `P${p}`;
                        btn.title = `Set phase ${p}`;
                        btn.onclick = () => sendSetPhase(tl.id, p);
                        btnsEl.appendChild(btn);
                    }
                    knownTLs[tl.id] = true;
                }
                const stateEl = document.getElementById(`tl-state-${tl.id}`);
                if (stateEl) stateEl.textContent = `Phase ${tl.phase}  ${tl.state}`;

                const aiEl = document.getElementById(`tl-ai-${tl.id}`);
                const a = ai[tl.id];
                if (aiEl && a) {
                    const [bg, fg] = aiColors(a.status);
                    aiEl.style.background = bg; aiEl.style.color = fg;
                    const y = a.inYellow ? ' Y' : '';
                    const slot = a.currentGreenSlot !== undefined ? ` slot=${a.currentGreenSlot}` : '';
                    const dec = a.decisions !== undefined ? ` Δ=${a.decisions}` : '';
                    aiEl.textContent = `AI: ${a.status}${slot}${y}${dec}`;
                }
            }
        }

        function sendSetPhase(tlsId, phase) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: 'setPhase', tlsId, phase }));
                wsLog(`→ setPhase(${tlsId}, ${phase})`);
            }
        }

        // --- RENDER LOOP ---
        function animate(time) {
            animationFrameId = requestAnimationFrame(animate);
            controls.update();
            // Use Composer instead of Renderer for post-processing bloom effect
            composer.render();
        }

        function onWindowResize() {
            const w = canvasContainer.clientWidth;
            const h = canvasContainer.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h); // Resize Composer as well
        }

        function resetSimulation() {
            while (networkGroup.children.length > 0) {
                const obj = networkGroup.children[0];
                networkGroup.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) obj.material.dispose();
            }
            lanePaths = [];
        }

        init();

    </script>
</body>

</html>
