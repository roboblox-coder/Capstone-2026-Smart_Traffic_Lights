<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUMO — Live Traffic Viewer</title>
  <style>
    /* ── Reset & Dark Theme ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --red:      #f85149;
      --yellow:   #d29922;
      --radius:   10px;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    #status-badge {
      font-size: 0.8rem; padding: 4px 12px; border-radius: 20px;
      background: rgba(248,81,73,.15); color: var(--red);
      transition: all .3s;
    }
    #status-badge.connected { background: rgba(63,185,80,.15); color: var(--green); }

    /* ── Main layout ────────────────────────────────────────────── */
    main { display: flex; flex: 1; overflow: hidden; }

    /* ── Canvas (Three.js) ──────────────────────────────────────── */
    #canvas-wrap { flex: 1; position: relative; }
    #canvas-wrap canvas { display: block; width: 100%; height: 100%; }

    /* ── Overlay HUD ────────────────────────────────────────────── */
    #hud {
      position: absolute; top: 12px; left: 12px;
      font-size: 0.78rem; color: var(--muted); line-height: 1.6;
      pointer-events: none;
    }
    #hud b { color: var(--text); }

    /* ── Sidebar ────────────────────────────────────────────────── */
    aside {
      width: 300px; background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    aside h2 {
      font-size: 0.85rem; padding: 14px 16px; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--border);
    }

    /* ── Traffic-Light Panel ────────────────────────────────────── */
    #tl-panel { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .tl-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center;
      justify-content: space-between; transition: border-color .2s;
    }
    .tl-card:hover { border-color: var(--accent); }
    .tl-id { font-size: 0.82rem; font-weight: 600; }
    .tl-state { font-family: 'Courier New', monospace; font-size: 0.75rem; color: var(--muted); word-break: break-all; max-width: 120px; }
    .tl-btns { display: flex; gap: 4px; }
    .tl-btns button {
      background: var(--border); border: none; color: var(--text);
      border-radius: 6px; padding: 4px 10px; font-size: 0.72rem;
      cursor: pointer; transition: background .2s;
    }
    .tl-btns button:hover { background: var(--accent); color: #000; }

    /* ── Log console ────────────────────────────────────────────── */
    #log-wrap {
      height: 160px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    #log-wrap h2 { flex-shrink: 0; }
    #log {
      flex: 1; overflow-y: auto; padding: 6px 14px;
      font-family: 'Courier New', monospace; font-size: 0.72rem;
      color: var(--muted); line-height: 1.5;
    }
    #log .err { color: var(--red); }
  </style>
</head>
<body>

<header>
  <h1>🚦 <span>SUMO</span> Live Viewer</h1>
  <span id="status-badge">● Disconnected</span>
</header>

<main>
  <!-- Three.js canvas -->
  <div id="canvas-wrap">
    <div id="hud">
      Step: <b id="hud-step">—</b><br>
      Vehicles: <b id="hud-veh">0</b><br>
      TLs: <b id="hud-tl">0</b>
    </div>
  </div>

  <!-- Right sidebar -->
  <aside>
    <h2>Traffic Lights</h2>
    <div id="tl-panel"><em style="font-size:.8rem;color:var(--muted)">Waiting for data…</em></div>
    <div id="log-wrap">
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </aside>
</main>

<!-- Three.js from CDN  -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── DOM refs ──────────────────────────────────────────────────────
const badge    = document.getElementById('status-badge');
const hudStep  = document.getElementById('hud-step');
const hudVeh   = document.getElementById('hud-veh');
const hudTl    = document.getElementById('hud-tl');
const tlPanel  = document.getElementById('tl-panel');
const logEl    = document.getElementById('log');
const wrap     = document.getElementById('canvas-wrap');

function log(msg, cls = '') {
  const d = document.createElement('div');
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (cls) d.className = cls;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

// ── Three.js scene ───────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
wrap.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(60, 1, 1, 50000);
camera.position.set(0, 800, 400);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Ground grid
const grid = new THREE.GridHelper(4000, 80, 0x222222, 0x1a1a1a);
grid.rotation.x = 0;
scene.add(grid);

// Ambient + directional light
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(300, 600, 400);
scene.add(dir);

// Vehicle pool: instanced mesh for performance
const VEH_MAX   = 5000;
const vehGeo    = new THREE.BoxGeometry(4, 2, 8);
const vehMat    = new THREE.MeshStandardMaterial({ color: 0x58a6ff });
const vehMesh   = new THREE.InstancedMesh(vehGeo, vehMat, VEH_MAX);
vehMesh.count   = 0;
scene.add(vehMesh);

const dummy = new THREE.Object3D();

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', resize);
resize();

// ── WebSocket ────────────────────────────────────────────────────
let ws;
let centerOffset = null;   // auto-center the first frame

function connect() {
  ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    badge.textContent = '● Connected';
    badge.classList.add('connected');
    log('Connected to SUMO WebSocket');
  };

  ws.onclose = () => {
    badge.textContent = '● Disconnected';
    badge.classList.remove('connected');
    log('Connection lost — retrying in 3 s …', 'err');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {};

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'step')  handleStep(msg);
    if (msg.type === 'error') log(`Server error: ${msg.message}`, 'err');
  };
}

function handleStep(msg) {
  hudStep.textContent = msg.step;
  hudVeh.textContent  = msg.vehicles.length;
  hudTl.textContent   = msg.trafficLights.length;

  // ── Auto-center on first data ──────────────────────────────
  if (!centerOffset && msg.vehicles.length > 0) {
    let sx = 0, sy = 0;
    for (const v of msg.vehicles) { sx += v.x; sy += v.y; }
    centerOffset = { x: sx / msg.vehicles.length, y: sy / msg.vehicles.length };
    camera.position.set(0, 800, 400);
    controls.target.set(0, 0, 0);
    log(`Centered view on (${centerOffset.x.toFixed(0)}, ${centerOffset.y.toFixed(0)})`);
  }

  // ── Update vehicles ────────────────────────────────────────
  const ox = centerOffset ? centerOffset.x : 0;
  const oy = centerOffset ? centerOffset.y : 0;
  const count = Math.min(msg.vehicles.length, VEH_MAX);
  vehMesh.count = count;

  for (let i = 0; i < count; i++) {
    const v = msg.vehicles[i];
    dummy.position.set(v.x - ox, 2, -(v.y - oy));
    // Convert SUMO angle (0 = north, clockwise) to Three.js Y rotation
    dummy.rotation.y = -THREE.MathUtils.degToRad(v.angle);
    // Scale by speed to give a subtle visual cue
    const s = 1 + v.speed * 0.02;
    dummy.scale.set(s, 1, s);
    dummy.updateMatrix();
    vehMesh.setMatrixAt(i, dummy.matrix);

    // Color by speed (blue → green → red)
    const hue = Math.max(0, 0.58 - v.speed * 0.015);
    const col = new THREE.Color().setHSL(hue, 0.8, 0.55);
    vehMesh.setColorAt(i, col);
  }
  vehMesh.instanceMatrix.needsUpdate = true;
  if (vehMesh.instanceColor) vehMesh.instanceColor.needsUpdate = true;

  // ── Update traffic-light sidebar ───────────────────────────
  updateTLPanel(msg.trafficLights);
}

// ── Traffic-light cards ──────────────────────────────────────────
let knownTLs = {};
function updateTLPanel(tls) {
  for (const tl of tls) {
    if (!knownTLs[tl.id]) {
      // First time seeing this TL — create card
      const card = document.createElement('div');
      card.className = 'tl-card';
      card.id = `tl-${tl.id}`;
      card.innerHTML = `
        <div>
          <div class="tl-id">${tl.id}</div>
          <div class="tl-state" id="tl-state-${tl.id}">${tl.state}</div>
        </div>
        <div class="tl-btns" id="tl-btns-${tl.id}"></div>`;
      tlPanel.innerHTML = '';  // remove placeholder on first real data
      tlPanel.appendChild(card);

      // Phase buttons (0‥max detected later; start with 4 phases)
      const btnsEl = document.getElementById(`tl-btns-${tl.id}`);
      for (let p = 0; p < 4; p++) {
        const btn = document.createElement('button');
        btn.textContent = `P${p}`;
        btn.title = `Set phase ${p}`;
        btn.onclick = () => sendSetPhase(tl.id, p);
        btnsEl.appendChild(btn);
      }
      knownTLs[tl.id] = true;
    }
    // Update state text
    const stateEl = document.getElementById(`tl-state-${tl.id}`);
    if (stateEl) stateEl.textContent = `Phase ${tl.phase}  ${tl.state}`;
  }
}

function sendSetPhase(tlsId, phase) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'setPhase', tlsId, phase }));
    log(`→ setPhase(${tlsId}, ${phase})`);
  }
}

// ── Render loop ──────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
connect();

</script>
</body>
</html>
